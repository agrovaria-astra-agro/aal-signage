<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAL Digital Signage</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#screen{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.loading{
    color:#fff;
    font-family:Arial, sans-serif;
    font-size:24px;
}

</style>
</head>

<body>

<div id="screen">
    <div class="loading">Loading Digital Signage...</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyKaucY5Klz1dFTVopD__ru81gMf4Ixju42vlOKc125LOEBkDGV17grmIRQtEovL9YLRA/exec";

let playlist = [];
let current = 0;
let timer = null;
let started = false;

async function loadPlaylist(){

    try{

        const response = await fetch(API_URL);

        playlist = await response.json();

        console.log("Playlist", playlist);

        if(playlist.length === 0){

            document.getElementById("screen").innerHTML =
            '<div class="loading">Playlist Kosong</div>';

            return;
        }

        if(!started){

            started = true;
            playItem();

        }

    }catch(error){

        console.error(error);

        document.getElementById("screen").innerHTML =
        '<div class="loading">Gagal Mengambil Playlist</div>';

    }

}

function nextItem(){

    clearTimeout(timer);

    current++;

    if(current >= playlist.length){

        current = 0;

    }

    playItem();

}

function playItem(){

    if(playlist.length === 0) return;

    const item = playlist[current];

    console.log("Playing", item);

    const screen =
    document.getElementById("screen");

    screen.innerHTML = "";

    const type =
    String(item.type || "")
    .trim()
    .toLowerCase();

    // IMAGE
    if(type === "image"){

        const img =
        document.createElement("img");

        img.src =
        "https://drive.google.com/thumbnail?id="
        + item.fileId +
        "&sz=w2000";

        img.onload = function(){

            console.log("Image loaded");

        };

        img.onerror = function(){

            console.error(
                "Image gagal:",
                item.fileId
            );

            setTimeout(
                nextItem,
                1000
            );

        };

        screen.appendChild(img);

        timer =
        setTimeout(
            nextItem,
            (Number(item.duration) || 15) * 1000
        );

        return;
    }

    // VIDEO
if(type === "video"){

    const video = document.createElement("video");

    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.controls = false;
    video.preload = "auto";

    video.src =
    "https://drive.google.com/uc?export=download&id="
    + item.fileId;

    video.onloadedmetadata = function(){

        console.log(
            "Durasi video:",
            video.duration
        );

        video.play();

    };

    video.onended = function(){

        nextItem();

    };

    video.onerror = function(){

        console.error(
            "Video gagal:",
            item.fileId
        );

        nextItem();

    };

    screen.appendChild(video);

        return;
    }

    console.error(
        "Type tidak dikenali:",
        item.type
    );

    setTimeout(
        nextItem,
        1000
    );

}

loadPlaylist();

setInterval(
    loadPlaylist,
    60000
);

</script>

</body>
</html>
